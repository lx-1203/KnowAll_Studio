<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阅读语言 — 渐进式中英混合学习</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 左侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">📖 阅读语言</div>
                <div class="logo-sub">渐进式语言学习工具</div>
            </div>

            <div class="level-selector" id="levelSelector">
                <button class="level-btn active l1" data-level="1">
                    🌱 初级<span class="level-label">10-25%英文</span>
                </button>
                <button class="level-btn l2" data-level="2">
                    🌿 中级<span class="level-label">25-50%英文</span>
                </button>
                <button class="level-btn l3" data-level="3">
                    🌳 高级<span class="level-label">50-80%英文</span>
                </button>
            </div>

            <div class="sidebar-nav">
                <button class="active" data-tab="articles">📚 文章库</button>
                <button data-tab="custom">✏️ 自定义</button>
            </div>

            <div class="sidebar-content" id="sidebarContent">
                <!-- 文章列表 动态加载 -->
                <div id="articleList"></div>
                <!-- 自定义输入 -->
                <div id="customPanel" class="custom-input-area" style="display:none;">
                    <textarea id="customText" placeholder="在此粘贴中文文本...&#10;&#10;例如：我们的世界很大，让我们去看看"></textarea>
                    <button class="btn-convert" onclick="convertCustom()">🔄 开始阅读</button>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="main-header">
                <h2 id="mainTitle">📚 选择一篇文章开始阅读</h2>
                <div class="main-header-actions">
                    <button class="reveal-toggle" id="revealToggle" onclick="toggleReveal()" title="切换显示/隐藏中文">
                        👁️ 显示中文
                    </button>
                    <button class="btn-icon" onclick="refreshReading()">🔄 刷新</button>
                    <button class="btn-icon" onclick="toggleSidebar()">☰</button>
                    <button class="btn-icon" onclick="togglePanel()" id="panelToggleBtn">📝 单词本</button>
                </div>
            </div>

            <div class="stats-bar" id="statsBar" style="display:none;">
                <div class="stat-item">
                    <span class="stat-icon">📊</span>
                    等级: <span class="stat-value" id="statLevel">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">🔄</span>
                    替换率: <span class="stat-value" id="statRatio">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">📝</span>
                    生词: <span class="stat-value" id="statWords">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">💾</span>
                    已收藏: <span class="stat-value" id="statSaved">-</span>
                </div>
            </div>

            <div class="reading-area">
                <div class="reading-content">
                    <div class="empty-state" id="emptyState">
                        <div class="icon">📖</div>
                        <h3>欢迎使用阅读语言</h3>
                        <p>从左侧选择一篇文章，或输入自定义文本<br>开始您的渐进式英语学习之旅</p>
                    </div>
                    <div class="reading-text" id="readingText" style="display:none;"></div>
                </div>
            </div>
        </main>

        <!-- 右侧面板 -->
        <aside class="right-panel" id="rightPanel">
            <div class="panel-header">
                正在阅读的生词 <span class="badge" id="vocabCount">0</span>
            </div>
            <div class="panel-content" id="vocabPanel">
                <div class="panel-empty">选择文章后，这里会显示当前文本中的生词</div>
            </div>
        </aside>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ============ 全局状态 ============
        let currentLevel = 1;
        let currentArticle = null;
        let currentVocab = [];
        let revealMode = true; // true=显示中文提示浮层, false=隐藏
        let savedWords = JSON.parse(localStorage.getItem('reading_lang_saved') || '{}');
        let readStats = JSON.parse(localStorage.getItem('reading_lang_stats') || '{"totalRead":0,"totalWords":0}');

        // ============ 初始化 ============
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.level-btn').forEach(btn => {
                btn.addEventListener('click', () => selectLevel(parseInt(btn.dataset.level)));
            });

            document.querySelectorAll('.sidebar-nav button').forEach(btn => {
                btn.addEventListener('click', () => switchTab(btn.dataset.tab));
            });

            loadArticles();
            updateStats();
        });

        // ============ 等级选择 ============
        function selectLevel(level) {
            currentLevel = level;
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.level-btn[data-level="${level}"]`).classList.add('active');

            if (currentArticle) {
                loadArticleContent(currentArticle);
            }
        }

        // ============ Tab 切换 ============
        function switchTab(tab) {
            document.querySelectorAll('.sidebar-nav button').forEach(b => b.classList.remove('active'));
            document.querySelector(`.sidebar-nav button[data-tab="${tab}"]`).classList.add('active');

            document.getElementById('articleList').style.display = tab === 'articles' ? 'block' : 'none';
            document.getElementById('customPanel').style.display = tab === 'custom' ? 'block' : 'none';

            if (tab === 'articles') loadArticles();
        }

        // ============ 加载文章列表 ============
        async function loadArticles() {
            try {
                const resp = await fetch('/api/articles');
                const articles = await resp.json();

                const listEl = document.getElementById('articleList');
                listEl.innerHTML = articles.map(a => `
                    <div class="article-item ${currentArticle && currentArticle.id === a.id ? 'active' : ''}"
                         onclick="selectArticle(${a.id})">
                        <div class="article-title">
                            ${a.title}
                            <span class="diff-badge d${a.difficulty}">L${a.difficulty}</span>
                        </div>
                        <div class="article-meta">
                            ${a.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                            <span>${a.content.length}字</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('加载文章失败', e);
            }
        }

        // ============ 选择文章 ============
        async function selectArticle(id) {
            try {
                const resp = await fetch(`/api/article/${id}`);
                const article = await resp.json();
                if (article.error) return;

                currentArticle = article;
                document.querySelectorAll('.article-item').forEach(el => {
                    el.classList.toggle('active', el.querySelector('.article-title').textContent.trim().startsWith(article.title));
                });

                loadArticles(); // 刷新高亮
                await loadArticleContent(article);
            } catch (e) {
                console.error('加载文章失败', e);
            }
        }

        // ============ 加载文章内容（转换） ============
        async function loadArticleContent(article) {
            document.getElementById('mainTitle').textContent = '📖 ' + article.title;
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('statsBar').style.display = 'flex';

            try {
                const resp = await fetch('/api/convert', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: article.content, level: currentLevel })
                });
                const data = await resp.json();
                if (data.error) return;

                currentVocab = data.vocabulary;
                renderText(data.result, data.vocabulary);
                renderVocabPanel(data.vocabulary);
                updateReadingStats(data);
            } catch (e) {
                console.error('转换失败', e);
            }
        }

        // ============ 渲染混合文本 ============
        function renderText(result, vocabulary) {
            const el = document.getElementById('readingText');
            el.style.display = 'block';

            // 建立英文词到中文的映射
            const enToCn = {};
            vocabulary.forEach(v => {
                const key = v.en.toLowerCase();
                if (!enToCn[key]) enToCn[key] = [];
                enToCn[key].push(v.cn);
            });

            // 分割文本，识别英文单词
            const parts = [];
            const regex = /([a-zA-Z]+(?:'[a-zA-Z]+)?|\s+|[^a-zA-Z\s]+)/g;
            let match;
            while ((match = regex.exec(result)) !== null) {
                const token = match[0];
                const key = token.toLowerCase();
                if (/^[a-zA-Z]/.test(token) && enToCn[key]) {
                    const cn = enToCn[key].shift() || enToCn[key][0] || '';
                    parts.push(`<span class="en-word ${revealMode ? 'revealed' : ''}" data-cn="${cn}" onclick="toggleWord(event, this)" title="点击切换显示中文">${token}<span class="cn-tip">${revealMode ? cn : '?'}</span></span>`);
                } else {
                    parts.push(token.replace(/</g, '&lt;').replace(/>/g, '&gt;'));
                }
            }

            el.innerHTML = parts.join('');
        }

        // ============ 点击单词切换中文 ============
        function toggleWord(event, el) {
            event.stopPropagation();
            const cn = el.dataset.cn;
            const tip = el.querySelector('.cn-tip');
            el.classList.toggle('revealed');

            if (el.classList.contains('revealed')) {
                tip.textContent = cn;
            } else {
                tip.textContent = '?';
            }
        }

        // ============ 全局切换显示/隐藏中文 ============
        function toggleReveal() {
            revealMode = !revealMode;
            const btn = document.getElementById('revealToggle');
            btn.classList.toggle('active', !revealMode);

            if (revealMode) {
                btn.innerHTML = '👁️ 显示中文';
            } else {
                btn.innerHTML = '🙈 隐藏中文';
            }

            document.querySelectorAll('.en-word').forEach(el => {
                const tip = el.querySelector('.cn-tip');
                if (revealMode) {
                    el.classList.add('revealed');
                    tip.textContent = el.dataset.cn;
                } else {
                    el.classList.remove('revealed');
                    tip.textContent = '?';
                }
            });
        }

        // ============ 渲染生词面板 ============
        function renderVocabPanel(vocabulary) {
            const panel = document.getElementById('vocabPanel');
            document.getElementById('vocabCount').textContent = vocabulary.length;

            if (vocabulary.length === 0) {
                panel.innerHTML = '<div class="panel-empty">当前文本无可替换词汇</div>';
                return;
            }

            panel.innerHTML = vocabulary.map((v, i) => {
                const key = `${v.cn}_${v.en}`;
                const saved = savedWords[key];
                return `
                    <div class="vocab-card ${saved ? 'saved' : ''}">
                        <div>
                            <span class="en-word-panel">${v.en}</span>
                            <span class="cn-word"> ← ${v.cn}</span>
                        </div>
                        <button class="save-btn ${saved ? 'saved' : ''}"
                                onclick="toggleSaveWord('${key}', '${v.cn}', '${v.en}', this)">
                            ${saved ? '✓' : '+'}
                        </button>
                    </div>
                `;
            }).join('');
        }

        // ============ 收藏/取消收藏单词 ============
        function toggleSaveWord(key, cn, en, btn) {
            if (savedWords[key]) {
                delete savedWords[key];
                btn.textContent = '+';
                btn.classList.remove('saved');
                btn.parentElement.classList.remove('saved');
                showToast(`已取消收藏 "${en}"`);
            } else {
                savedWords[key] = { cn, en, time: Date.now() };
                btn.textContent = '✓';
                btn.classList.add('saved');
                btn.parentElement.classList.add('saved');
                showToast(`已收藏 "${en}" ← "${cn}"`);
            }
            localStorage.setItem('reading_lang_saved', JSON.stringify(savedWords));
            updateStats();
        }

        // ============ 更新统计 ============
        function updateReadingStats(data) {
            document.getElementById('statLevel').textContent = 'L' + data.level;
            document.getElementById('statRatio').textContent = data.ratio;
            document.getElementById('statWords').textContent = data.word_count;
            document.getElementById('statSaved').textContent = Object.keys(savedWords).length;
            if (data.source === 'dictionary') {
                document.getElementById('mainTitle').textContent += ' [离线模式]';
            }

            readStats.totalRead++;
            readStats.totalWords += data.word_count;
            localStorage.setItem('reading_lang_stats', JSON.stringify(readStats));
        }

        function updateStats() {
            document.getElementById('statSaved').textContent = Object.keys(savedWords).length;
        }

        // ============ 刷新阅读 ============
        function refreshReading() {
            if (currentArticle) {
                loadArticleContent(currentArticle);
            }
        }

        // ============ 自定义文本转换 ============
        async function convertCustom() {
            const text = document.getElementById('customText').value.trim();
            if (!text) {
                showToast('请输入文本');
                return;
            }

            document.getElementById('mainTitle').textContent = '✏️ 自定义文本';
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('statsBar').style.display = 'flex';

            try {
                const resp = await fetch('/api/convert', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, level: currentLevel })
                });
                const data = await resp.json();
                if (data.error) {
                    showToast(data.error);
                    return;
                }

                currentVocab = data.vocabulary;
                currentArticle = null;
                renderText(data.result, data.vocabulary);
                renderVocabPanel(data.vocabulary);
                updateReadingStats(data);
            } catch (e) {
                showToast('请求失败，请检查服务是否运行');
            }
        }

        // ============ Toast ============
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ============ 侧栏/面板切换 ============
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function togglePanel() {
            document.getElementById('rightPanel').classList.toggle('open');
        }

        // ============ 快捷键 ============
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                const tab = document.querySelector('.sidebar-nav button.active')?.dataset?.tab;
                if (tab === 'custom') convertCustom();
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'r') {
                e.preventDefault();
                refreshReading();
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
                e.preventDefault();
                toggleReveal();
            }
        });
    </script>
</body>
</html>
