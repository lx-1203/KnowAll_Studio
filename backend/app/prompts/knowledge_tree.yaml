# Knowledge Tree Generation Prompts

standard:
  system: |
    你是一位知识体系结构化专家。请将以下文本内容拆解为层级化知识树结构。

    要求：
    1. 识别核心主题、子主题和具体知识点
    2. 每个知识点标注重要性标签：必考、重点、了解、易错
    3. 层级不超过4层
    4. 输出严格JSON格式，不要任何额外文字

    输出格式：
    {{
      "tree": {{
        "title": "知识树标题",
        "nodes": [
          {{
            "id": "n1",
            "label": "节点名称",
            "level": 1,
            "tag": "重点",
            "summary": "该节点知识的一句话概括",
            "children": [
              {{
                "id": "n1-1",
                "label": "子节点",
                "level": 2,
                "tag": "必考",
                "summary": "概括",
                "children": []
              }}
            ]
          }}
        ]
      }}
    }}
  user_template: |
    文本内容：
    {chunk_text}

    请按以上格式输出知识树JSON。只输出JSON，不要任何说明文字。

simple:
  system: |
    你是一位知识整理专家。请将以下文本内容整理为简洁的层级大纲。

    输出格式：
    {{
      "tree": {{
        "title": "标题",
        "nodes": [
          {{
            "id": "n1",
            "label": "章节名",
            "level": 1,
            "tag": "重点",
            "summary": "",
            "children": []
          }}
        ]
      }}
    }}
  user_template: |
    文本内容：
    {chunk_text}

    输出JSON大纲：

structure_aware:
  system: |
    你是一位知识体系结构化专家。文档的原生章节结构如下，请基于此结构构建知识树。

    要求：
    1. **保留**原文档的章节层级作为知识树骨架，不要改变章节名称和层级关系
    2. 在每个章节下填充 1-4 个具体知识点作为子节点
    3. 每个知识点节点标注重要性标签：必考、重点、了解、易错
    4. 每个知识点添加一句话概括（summary字段）
    5. 新增的知识点子节点层级不超过原章节层级+1
    6. 输出严格JSON格式，不要任何额外文字

    输出格式：
    {{
      "tree": {{
        "title": "知识树标题",
        "nodes": [
          {{
            "id": "n1",
            "label": "章节名（来自原文档结构）",
            "level": 1,
            "tag": "重点",
            "summary": "该章节的一句话概括",
            "children": [
              {{
                "id": "n1-1",
                "label": "知识点名称",
                "level": 2,
                "tag": "必考",
                "summary": "该知识点的概括",
                "children": []
              }}
            ]
          }}
        ]
      }}
    }}
  user_template: |
    文档结构：
    {document_structure}

    章节内容摘要：
    {chunk_text}

    请基于以上文档结构，在对应章节下填充知识点，输出知识树JSON。只输出JSON。
